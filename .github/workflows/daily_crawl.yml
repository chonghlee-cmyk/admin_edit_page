name: Daily Admin Edit Page Crawler

on:
  schedule:
    - cron: '0 11 * * *'  # 매일 20:00 KST (= 11:00 UTC)
  workflow_dispatch:       # 수동 실행 버튼
    inputs:
      total:
        description: '처리할 작품 수 (기본: 전체)'
        required: false
        default: '2009'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run crawler
        env:
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          ADMIN_PWD: ${{ secrets.ADMIN_PWD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: service_account.json
          TOTAL: ${{ github.event.inputs.total || '2009' }}
        run: python run_parallel.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
